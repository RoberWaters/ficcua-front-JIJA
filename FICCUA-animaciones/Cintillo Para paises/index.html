<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FICCUA</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<h1> iSOMOS FICCUA! </h1>

	<!-- Cintillo con banderas en scroll infinito: .slide-track se duplica (Set 1 + Set 2)
	     para que la animación CSS pueda hacer loop sin salto visible -->
	<div class="slider">
		<div class="slide-track">
			<!-- Set 1 -->
			<div class="slide"><img src="img/cr.svg" height="70" alt="Costa Rica" /></div>
			<div class="slide"><img src="img/cu.svg" height="70" alt="Cuba" /></div>
			<div class="slide"><img src="img/do.svg" height="70" alt="República Dominicana" /></div>
			<div class="slide"><img src="img/gt.svg" height="70" alt="Guatemala" /></div>
			<div class="slide"><img src="img/hn.svg" height="70" alt="Honduras" /></div>
			<div class="slide"><img src="img/ni.svg" height="70" alt="Nicaragua" /></div>
			<div class="slide"><img src="img/pa.svg" height="70" alt="Panamá" /></div>
			<div class="slide"><img src="img/sv.svg" height="70" alt="El Salvador" /></div>

			<!-- Set 2 (duplicate for seamless loop) -->
			<div class="slide"><img src="img/cr.svg" height="70" alt="Costa Rica" /></div>
			<div class="slide"><img src="img/cu.svg" height="70" alt="Cuba" /></div>
			<div class="slide"><img src="img/do.svg" height="70" alt="República Dominicana" /></div>
			<div class="slide"><img src="img/gt.svg" height="70" alt="Guatemala" /></div>
			<div class="slide"><img src="img/hn.svg" height="70" alt="Honduras" /></div>
			<div class="slide"><img src="img/ni.svg" height="70" alt="Nicaragua" /></div>
			<div class="slide"><img src="img/pa.svg" height="70" alt="Panamá" /></div>
			<div class="slide"><img src="img/sv.svg" height="70" alt="El Salvador" /></div>
		</div>
	</div>

</body>
</html>
